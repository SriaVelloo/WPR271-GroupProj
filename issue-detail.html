<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracker|Issue Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/IFFavicon1.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            
            <a class="navbar-brand" href="index.html">
                <img src="assets/IFFavicon1.png" alt="logo" class="logo">
                <strong>BugTracker</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="issue-form.html"> New Issue</a></li>
                    <li class="nav-item"><a class="nav-link" href="people.html"> People</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html"> Projects</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <div class="mb-3">
            <a href="index.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">
                        Issue: <span id="issueSummary">Loading...</span>
                    </h3>
                    <span id="issueStatusBadge" class="badge bg-light text-dark px-3 py-2"></span>
                </div>
            </div>
            
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <div class="mb-4">
                            <h5> Description</h5>
                            <div class="bg-light p-3 rounded" id="issueDescription">Loading...</div>
                        </div>
                        <div class="mb-4">
                            <h5> Resolution Summary</h5>
                            <div class="bg-light p-3 rounded" id="issueResolution">No resolution summary provided yet.</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-light">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fas fa-info-circle"></i> Issue Details</h5>
                                <hr>
                                <table class="table table-sm table-borderless">
                                    <tr><td class="fw-bold">Priority:</td><td id="issuePriority">-</td></tr>
                                    <tr><td class="fw-bold">Project:</td><td id="issueProject">-</td></tr>
                                    <tr><td class="fw-bold">Assigned To:</td><td id="issueAssignee">-</td></tr>
                                    <tr><td class="fw-bold">Target Date:</td><td id="issueTargetDate">-</td></tr>
                                    <tr><td class="fw-bold">Actual Resolution:</td><td id="issueActualDate">-</td></tr>
                                </table>
                                <div class="d-grid gap-2">
                                    <button id="editIssueBtn" class="btn btn-warning"> Edit Issue</button>
                                    <button id="deleteIssueBtn" class="btn btn-danger"><i class="fas fa-trash"></i> Delete Issue</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header"><i class="fas fa-bell me-2"></i><strong class="me-auto">Notification</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
            <div class="toast-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
