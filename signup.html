<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueFlow | Sign Up</title>
    <link rel="stylesheet" href="main.css">
    <link rel="shortcut icon" href="images/IFFavicon1.png" type="image/x-png">
</head>
<body>
        <img class = "logo" src="images/IFLogoTransparent1.png" alt="logo">
        <div class = "signup">
        <form id="signupForm">
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="fname" required><br>
            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lname" required><br>
            <label for="id">ID Number (Birth Date):</label><br>
            <input type="tel" id="id" name="id" required><br>
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="uname">Username:</label><br>
            <input type="text" id="uname" name="uname" required><br>
            <label for="pword">Password:</label><br>
            <input type="password" id="pword" name="pword" required><br>
            <button type="submit">Sign Up</button>
            <li><a href="login.html" target = "_blank">Login Here</a></li>
        </form>
        <p id="message"></p>
        </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const message = document.getElementById('message');

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const userData = {
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                id: document.getElementById('id').value,
                email: document.getElementById('email').value,
                uname: document.getElementById('uname').value,
                pword: document.getElementById('pword').value
            };

            localStorage.setItem('user_' + userData.uname, JSON.stringify(userData));
            message.textContent = "Sign up successful! Redirecting to login...";
            message.style.color = "green";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        });
    </script>
</body>
</html>
