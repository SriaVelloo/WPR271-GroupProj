<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueFlow | People</title>
    <link rel="stylesheet" href="people.css">
    <link rel="shortcut icon" href="images/IFFavicon1.png" type="image/x-png">
</head>
<body>
        <img class = "logo" src="images/IFLogoTransparent1.png" alt="logo">
        <ul class = "navbar">
            <li><a href="bugs.html" target = "_blank">Bugs</a></li>
            <li><a href="projects.html" target = "_blank">Projects</a></li>
            <li><a href="people.html" target = "_blank">People</a></li>
            <li><a href="home.html" target = "_blank">Home</a></li>
        </ul>

    <h1>Registered Users</h1>

    <div class="top-actions">
        <button onclick="loadUsers()">Refresh</button>
        <button onclick="clearAllUsers()">Delete All Users</button>
    </div>

    <div id="userContainer"></div>

    <script>
        const container = document.getElementById("userContainer");

        function loadUsers() {
            container.innerHTML = "";

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);

                if (key.startsWith("user_")) {
                    const userData = JSON.parse(localStorage.getItem(key));

                    const div = document.createElement("div");
                    div.className = "user-card";

                    div.innerHTML = `
                        <p><strong>First Name:</strong> ${userData.fname}</p>
                        <p><strong>Last Name:</strong> ${userData.lname}</p>
                        <p><strong>ID:</strong> ${userData.id}</p>
                        <p><strong>Email:</strong> ${userData.email}</p>
                        <p><strong>Username:</strong> ${userData.uname}</p>

                        <div class="actions">
                            <button onclick="deleteUser('${userData.uname}')">Delete</button>
                            <button onclick="editUser('${userData.uname}')">Edit</button>
                        </div>

                        <div id="edit-${userData.uname}"></div>
                    `;

                    container.appendChild(div);
                }
            }
        }

        function deleteUser(username) {
            if (confirm("Are you sure you want to delete this user?")) {
                localStorage.removeItem("user_" + username);
                loadUsers();
            }
        }

        function clearAllUsers() {
            if (confirm("This will delete ALL users. Continue?")) {
                const keysToDelete = [];

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith("user_")) {
                        keysToDelete.push(key);
                    }
                }

                keysToDelete.forEach(key => localStorage.removeItem(key));
                loadUsers();
            }
        }

        function editUser(username) {
            const userData = JSON.parse(localStorage.getItem("user_" + username));
            const editDiv = document.getElementById("edit-" + username);

            editDiv.innerHTML = `
                <h4>Edit User</h4>
                <input id="fname-${username}" value="${userData.fname}">
                <input id="lname-${username}" value="${userData.lname}">
                <input id="id-${username}" value="${userData.id}">
                <input id="email-${username}" value="${userData.email}">
                <input id="pword-${username}" value="${userData.pword}">
                <button onclick="saveUser('${username}')">Save</button>
            `;
        }

        function saveUser(username) {
            const updatedUser = {
                fname: document.getElementById(`fname-${username}`).value,
                lname: document.getElementById(`lname-${username}`).value,
                id: document.getElementById(`id-${username}`).value,
                email: document.getElementById(`email-${username}`).value,
                uname: username,
                pword: document.getElementById(`pword-${username}`).value
            };

            localStorage.setItem("user_" + username, JSON.stringify(updatedUser));
            loadUsers();
        }

        // Load users when page opens
        loadUsers();
    </script>

</body>
</html>
