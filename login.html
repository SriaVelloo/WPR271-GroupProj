<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueFlow | Login</title>
    <link rel="stylesheet" href="main.css">
    <link rel="shortcut icon" href="images/IFFavicon1.png" type="image/x-png">
</head>
<body>
        <img class = "logo" src="images/IFLogoTransparent1.png" alt="logo">
        <div class = "loginform">
        <form id="loginForm">
            <label for="uname">Username:</label><br>
            <input type="text" id="uname" name="uname" required><br>
            <label for="pword">Password:</label><br>
            <input type="password" id="pword" name="pword" required><br>
            <button type="submit">Login</button>
            <label><input type="checkbox" checked="checked" name="remember">Remember me</label>
            <li><a href="signup.html" target = "_blank">Sign Up Here</a></li>
        </form>
            <p id="message"></p>
        </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const message = document.getElementById('message');

            loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 

        const username = document.getElementById('uname').value;
        const password = document.getElementById('pword').value;

        // Get user from localStorage
        const storedUser = localStorage.getItem('user_' + username);

        // ❌ If user does NOT exist
        if (!storedUser) {
            message.textContent = "User does not exist. Please sign up first.";
            message.style.color = "red";
            return;
        }

        // ✅ If user exists, check password
        const userData = JSON.parse(storedUser);

        if (userData.pword === password) {
            // ✅ Login success
            localStorage.setItem("currentUser", username);
            localStorage.setItem("isLoggedIn", "true");

            window.location.href = "home.html";
        } else {
            // ❌ Wrong password
            message.textContent = "Incorrect password!";
            message.style.color = "red";
        }
    });
    </script>
</body>
</html>
