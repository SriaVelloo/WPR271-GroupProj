<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueFlow | Bugs</title>
    <link rel="stylesheet" href="bugs.css">
    <link rel="shortcut icon" href="images/IFFavicon1.png" type="image/x-png">
</head>
<body>
        <img class = "logo" src="images/IFLogoTransparent1.png" alt="logo">
        <ul class = "navbar">
            <li><a href="bugs.html" target = "_blank">Bugs</a></li>
            <li><a href="projects.html" target = "_blank">Projects</a></li>
            <li><a href="people.html" target = "_blank">People</a></li>
            <li><a href="home.html" target = "_blank">Home</a></li>
        </ul>
    <h1>All Submitted Bugs</h1>

<table border="1" id="bugsTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Summary</th>
            <th>Identifier</th>
            <th>Date Submitted</th>
            <th>Project</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Target Resolution Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    const bugs = JSON.parse(localStorage.getItem('bugs') || '[]');
    const tableBody = document.querySelector('#bugsTable tbody');

    if (bugs.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="10">No bugs submitted yet.</td></tr>`;
    } else {
        bugs.forEach(bug => {
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${bug.bname}</td>
                <td>${bug.bdesc}</td>
                <td>${bug.bsum}</td>
                <td>${bug.bident}</td>
                <td>${bug.bdatesub}</td>
                <td>${bug.bproj}</td>
                <td>${bug.bassi}</td>
                <td>${bug.bstat}</td>
                <td>${bug.bprio}</td>
                <td>${bug.bdatetarres}</td>
            `;

            tableBody.appendChild(row);
        });
    }
</script>
</body>
</html>
